services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - ANALYSIS_FPS=${ANALYSIS_FPS:-2}
    volumes:
      - backend_data:/app/data            # SQLite DB, uploads, embedding cache
      - ./backend/faces_db:/app/faces_db  # live face enrollment persists on host
    restart: unless-stopped

  # Local-dev frontend (production frontend deploys to Vercel instead)
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules   # keep container deps separate from host installs
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
